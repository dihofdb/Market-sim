  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

dy.day   .lh-rule { background: #0a1a2e; }\n\n  .lh-sub {\n    font-size: 8px;\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n    opacity: 0.35;\n    font-weight: 400;\n  }\n\n  /* ── HUD ── */\n  .hud { position: fixed; z-index: 10; pointer-events: none; }\n\n  #legend-hud { top: 110px; left: 28px; display: flex; flex-direction: column; gap: 7px; }\n\n  .legend-item {\n    display: flex; align-items: center; gap: 9px;\n    font-size: 10px; letter-spacing: 0.09em;\n    text-transform: uppercase; opacity: 0.55;\n  }\n  .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }\n  .leg-active { background: #00e5a0; box-shadow: 0 0 6px #00e5a077; }\n\n  body.night .leg-inactive { background: #232330; border: 1px solid #333345; }\n  body.day   .leg-inactive { background: #b8ccd8; border: 1px solid #9ab0bf; }\n\n  #count-hud { bottom: 28px; left: 28px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.45; }\n  #count-hud span { color: #00e5a0; font-weight: 600; opacity: 1; }\n\n  #hint-hud {\n    bottom: 28px; left: 50%; transform: translateX(-50%);\n    font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase;\n    opacity: 0.22; white-space: nowrap;\n  }\n\n  /* ── Day/Night toggle ── */\n  #daynight {\n    position: fixed; top: 110px; right: 28px; z-index: 20;\n    display: flex; align-items: center; gap: 10px;\n    background: rgba(128,128,128,0.12);\n    border: 1px solid rgba(128,128,128,0.18);\n    border-radius: 20px; padding: 5px 12px;\n    cursor: pointer; backdrop-filter: blur(8px);\n    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;\n    transition: border-color 0.15s;\n  }\n  #daynight:hover { border-color: rgba(128,128,128,0.4); }\n\n  .dn-icon { font-size: 13px; }\n\n  .dn-track {\n    width: 28px; height: 15px; border-radius: 8px;\n    position: relative; transition: background 0.3s;\n  }\n  body.night .dn-track { background: #1e2a38; }\n  body.day   .dn-track { background: #88bde0; }\n\n  .dn-thumb {\n    position: absolute; top: 2px;\n    width: 11px; height: 11px; border-radius: 50%;\n    transition: left 0.3s, background 0.3s;\n  }\n  body.night .dn-thumb { left: 2px; background: #c8d8e8; }\n  body.day   .dn-thumb { left: 15px; background: #f5c842; }\n\n  /* ── Tooltip ── */\n  #tooltip {\n    position: fixed; z-index: 20;\n    padding: 9px 14px; border-radius: 7px;\n    pointer-events: none; opacity: 0;\n    transition: opacity 0.12s; white-space: nowrap;\n    backdrop-filter: blur(12px);\n  }\n  body.night #tooltip { background: rgba(5,5,12,0.88); border: 1px solid rgba(255,255,255,0.1); }\n  body.day   #tooltip { background: rgba(255,255,255,0.88); border: 1px solid rgba(10,26,46,0.15); }\n\n  #tooltip.show { opacity: 1; }\n  #tt-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }\n  .tt-active   { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #00c488; }\n  body.night .tt-inactive { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); }\n  body.day   .tt-inactive { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(10,26,46,0.4); }\n  .tt-hint { font-size: 10px; margin-top: 3px; opacity: 0.28; }\n\n  /* ── Zoom controls ── */\n  #zoom-controls {\n    position: fixed; right: 28px; top: 50%; transform: translateY(-50%);\n    z-index: 20; display: flex; flex-direction: column; gap: 4px;\n  }\n  .zoom-btn {\n    width: 32px; height: 32px; border-radius: 6px;\n    font-size: 18px; cursor: pointer; display: flex;\n    align-items: center; justify-content: center;\n    backdrop-filter: blur(8px); line-height: 1;\n    transition: border-color 0.15s, color 0.15s;\n  }\n  body.night .zoom-btn { background: rgba(10,10,16,0.75); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }\n  body.day   .zoom-btn { background: rgba(255,255,255,0.55); border: 1px solid rgba(10,26,46,0.15); color: rgba(10,26,46,0.5); }\n  .zoom-btn:hover { border-color: rgba(128,128,128,0.4) !important; }\n\n  /* ── Edit panel ── */\n  #edit-btn {\n    position: fixed; bottom: 24px; right: 24px; z-index: 20;\n    border-radius: 8px; padding: 9px 16px;\n    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;\n    cursor: pointer; backdrop-filter: blur(10px);\n    transition: border-color 0.15s, color 0.15s;\n  }\n  body.night #edit-btn { background: rgba(10,10,16,0.8); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.45); }\n  body.day   #edit-btn { background: rgba(255,255,255,0.6); border: 1px solid rgba(10,26,46,0.18); color: rgba(10,26,46,0.5); }\n  #edit-btn:hover { border-color: rgba(128,128,128,0.4) !important; }\n\n  #edit-panel {\n    position: fixed; bottom: 68px; right: 24px; z-index: 20;\n    width: 216px; max-height: 360px; border-radius: 10px;\n    display: none; flex-direction: column; backdrop-filter: blur(14px);\n  }\n  #edit-panel.open { display: flex; }\n  body.night #edit-panel { background: rgba(8,8,14,0.92); border: 1px solid rgba(255,255,255,0.1); }\n  body.day   #edit-panel { background: rgba(240,248,255,0.92); border: 1px solid rgba(10,26,46,0.15); }\n\n  .ep-header {\n    padding: 14px 14px 10px;\n    font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;\n    border-bottom: 1px solid rgba(128,128,128,0.12); flex-shrink: 0; opacity: 0.5;\n  }\n\n  #ep-list { overflow-y: auto; flex: 1; padding: 6px 0; }\n  #ep-list::-webkit-scrollbar { width: 3px; }\n  #ep-list::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 2px; }\n\n  .ep-item {\n    display: flex; align-items: center; gap: 10px;\n    padding: 7px 14px; font-size: 12px; cursor: pointer;\n    transition: background 0.1s;\n  }\n  body.night .ep-item { color: rgba(255,255,255,0.65); }\n  body.day   .ep-item { color: rgba(10,26,46,0.7); }\n  body.night .ep-item:hover { background: rgba(255,255,255,0.05); }\n  body.day   .ep-item:hover { background: rgba(10,26,46,0.05); }\n\n  .ep-check {\n    width: 13px; height: 13px; border-radius: 3px;\n    border: 1.5px solid rgba(128,128,128,0.3); flex-shrink: 0; position: relative;\n  }\n  .ep-check.on { background: #00e5a0; border-color: #00e5a0; }\n  .ep-check.on::after {\n    content: ''; position: absolute; left: 2px; top: 1px;\n    width: 7px; height: 4px;\n    border-left: 1.5px solid #000; border-bottom: 1.5px solid #000;\n    transform: rotate(-45deg);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"night\">\n\n<canvas id=\"stars-canvas\"><\u002Fcanvas>\n<canvas id=\"globe-canvas\"><\u002Fcanvas>\n\n<!-- Letterhead -->\n<div id=\"letterhead\">\n  <div class=\"lh-eyebrow\">Prestige Eyebrow Cosmetics &amp; Tools<\u002Fdiv>\n  <div class=\"lh-logo\">The BrowGal<\u002Fdiv>\n  <div class=\"lh-rule\"><\u002Fdiv>\n  <div class=\"lh-sub\">Global Market Presence<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Legend -->\n<div class=\"hud\" id=\"legend-hud\">\n  <div class=\"legend-item\"><div class=\"leg-dot leg-active\"><\u002Fdiv>Active market<\u002Fdiv>\n  <div class=\"legend-item\"><div class=\"leg-dot leg-inactive\"><\u002Fdiv>Not yet active<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Count -->\n<div class=\"hud\" id=\"count-hud\"><span id=\"active-n\">2<\u002Fspan> active markets<\u002Fdiv>\n<div class=\"hud\" id=\"hint-hud\">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Double-click a country to toggle<\u002Fdiv>\n\n<!-- Tooltip -->\n<div id=\"tooltip\">\n  <div id=\"tt-name\"><\u002Fdiv>\n  <div id=\"tt-status\"><\u002Fdiv>\n  <div class=\"tt-hint\">Double-click to toggle<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Day/Night -->\n<div id=\"daynight\">\n  <span class=\"dn-icon\" id=\"dn-icon-left\">🌙<\u002Fspan>\n  <div class=\"dn-track\"><div class=\"dn-thumb\"><\u002Fdiv><\u002Fdiv>\n  <span class=\"dn-icon\" id=\"dn-icon-right\">☀️<\u002Fspan>\n<\u002Fdiv>\n\n<!-- Zoom -->\n<div id=\"zoom-controls\">\n  <button class=\"zoom-btn\" id=\"zoom-in\">+<\u002Fbutton>\n  <button class=\"zoom-btn\" id=\"zoom-out\">−<\u002Fbutton>\n<\u002Fdiv>\n\n<button id=\"edit-btn\">Edit Markets<\u002Fbutton>\n<div id=\"edit-panel\">\n  <div class=\"ep-header\">Active Markets<\u002Fdiv>\n  <div id=\"ep-list\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── Stars ──────────────────────────────────────────────────────\nconst starsCanvas = document.getElementById('stars-canvas');\nconst sCtx = starsCanvas.getContext('2d');\nstarsCanvas.width  = window.innerWidth;\nstarsCanvas.height = window.innerHeight;\nfor (let i = 0; i < 350; i++) {\n  const x = Math.random() * starsCanvas.width;\n  const y = Math.random() * starsCanvas.height;\n  const r = Math.random() * 1.2;\n  const a = Math.random() * 0.55 + 0.1;\n  sCtx.beginPath();\n  sCtx.arc(x, y, r, 0, Math.PI * 2);\n  sCtx.fillStyle = `rgba(255,255,255,${a})`;\n  sCtx.fill();\n}\n\n// ── State ──────────────────────────────────────────────────────\nlet isNight = true;\nconst ACTIVE = new Set(['NLD','UKR']);\n\nconst EURO_CODES = new Set([\n  'ALB','AND','AUT','BLR','BEL','BIH','BGR','HRV','CYP','CZE','DNK','EST',\n  'FIN','FRA','DEU','GRC','HUN','ISL','IRL','ITA','XKX','LVA','LIE','LTU',\n  'LUX','MKD','MLT','MDA','MCO','MNE','NLD','NOR','POL','PRT','ROU','RUS',\n  'SMR','SRB','SVK','SVN','ESP','SWE','CHE','TUR','UKR','GBR','VAT'\n]);\n\n// Comprehensive ISO numeric → alpha3\nconst NUM_TO_A3 = {\n  4:'AFG',8:'ALB',12:'DZA',20:'AND',24:'AGO',32:'ARG',36:'AUS',40:'AUT',\n  50:'BGD',56:'BEL',64:'BTN',68:'BOL',70:'BIH',72:'BWA',76:'BRA',100:'BGR',\n  104:'MMR',116:'KHM',120:'CMR',124:'CAN',144:'LKA',152:'CHL',156:'CHN',\n  170:'COL',180:'COD',188:'CRI',191:'HRV',192:'CUB',196:'CYP',203:'CZE',\n  204:'BEN',208:'DNK',218:'ECU',818:'EGY',222:'SLV',231:'ETH',246:'FIN',\n  250:'FRA',266:'GAB',276:'DEU',288:'GHA',300:'GRC',320:'GTM',324:'GIN',\n  332:'HTI',340:'HND',348:'HUN',356:'IND',360:'IDN',364:'IRN',368:'IRQ',\n  372:'IRL',376:'ISR',380:'ITA',388:'JAM',392:'JPN',400:'JOR',398:'KAZ',\n  404:'KEN',408:'PRK',410:'KOR',414:'KWT',418:'LAO',428:'LVA',422:'LBN',\n  430:'LBR',434:'LBY',438:'LIE',440:'LTU',442:'LUX',450:'MDG',454:'MWI',\n  458:'MYS',466:'MLI',470:'MLT',484:'MEX',496:'MNG',498:'MDA',504:'MAR',\n  508:'MOZ',516:'NAM',524:'NPL',528:'NLD',540:'NCL',558:'NIC',562:'NER',\n  566:'NGA',578:'NOR',586:'PAK',591:'PAN',604:'PER',608:'PHL',616:'POL',\n  620:'PRT',630:'PRI',634:'QAT',642:'ROU',643:'RUS',646:'RWA',682:'SAU',\n  686:'SEN',694:'SLE',706:'SOM',710:'ZAF',724:'ESP',736:'SDN',752:'SWE',\n  756:'CHE',760:'SYR',762:'TJK',764:'THA',768:'TGO',780:'TTO',788:'TUN',\n  792:'TUR',800:'UGA',804:'UKR',784:'ARE',826:'GBR',834:'TZA',840:'USA',\n  858:'URY',860:'UZB',862:'VEN',704:'VNM',887:'YEM',894:'ZMB',716:'ZWE',\n  729:'SDN',728:'SSD',112:'BLR',352:'ISL',688:'SRB',703:'SVK',705:'SVN',\n  807:'MKD',499:'MNE',383:'XKX',492:'MCO',674:'SMR',336:'VAT',8:'ALB',\n  20:'AND'\n};\n\nconst NAMES = {\n  AFG:'Afghanistan',ALB:'Albania',DZA:'Algeria',AND:'Andorra',AGO:'Angola',\n  ARG:'Argentina',AUS:'Australia',AUT:'Austria',BGD:'Bangladesh',BEL:'Belgium',\n  BTN:'Bhutan',BOL:'Bolivia',BIH:'Bosnia & Herz.',BWA:'Botswana',BRA:'Brazil',\n  BGR:'Bulgaria',MMR:'Myanmar',KHM:'Cambodia',CMR:'Cameroon',CAN:'Canada',\n  LKA:'Sri Lanka',CHL:'Chile',CHN:'China',COL:'Colombia',COD:'DR Congo',\n  CRI:'Costa Rica',HRV:'Croatia',CUB:'Cuba',CYP:'Cyprus',CZE:'Czech Republic',\n  BEN:'Benin',DNK:'Denmark',ECU:'Ecuador',EGY:'Egypt',SLV:'El Salvador',\n  ETH:'Ethiopia',FIN:'Finland',FRA:'France',GAB:'Gabon',DEU:'Germany',\n  GHA:'Ghana',GRC:'Greece',GTM:'Guatemala',GIN:'Guinea',HTI:'Haiti',\n  HND:'Honduras',HUN:'Hungary',IND:'India',IDN:'Indonesia',IRN:'Iran',\n  IRQ:'Iraq',IRL:'Ireland',ISR:'Israel',ITA:'Italy',JAM:'Jamaica',\n  JPN:'Japan',JOR:'Jordan',KAZ:'Kazakhstan',KEN:'Kenya',PRK:'North Korea',\n  KOR:'South Korea',KWT:'Kuwait',LAO:'Laos',LVA:'Latvia',LBN:'Lebanon',\n  LBR:'Liberia',LBY:'Libya',LIE:'Liechtenstein',LTU:'Lithuania',LUX:'Luxembourg',\n  MDG:'Madagascar',MWI:'Malawi',MYS:'Malaysia',MLI:'Mali',MLT:'Malta',\n  MEX:'Mexico',MNG:'Mongolia',MDA:'Moldova',MAR:'Morocco',MOZ:'Mozambique',\n  NAM:'Namibia',NPL:'Nepal',NLD:'Netherlands',NIC:'Nicaragua',NER:'Niger',\n  NGA:'Nigeria',NOR:'Norway',PAK:'Pakistan',PAN:'Panama',PER:'Peru',\n  PHL:'Philippines',POL:'Poland',PRT:'Portugal',QAT:'Qatar',ROU:'Romania',\n  RUS:'Russia',RWA:'Rwanda',SAU:'Saudi Arabia',SEN:'Senegal',SLE:'Sierra Leone',\n  SOM:'Somalia',ZAF:'South Africa',ESP:'Spain',SDN:'Sudan',SWE:'Sweden',\n  CHE:'Switzerland',SYR:'Syria',TJK:'Tajikistan',THA:'Thailand',TGO:'Togo',\n  TTO:'Trinidad',TUN:'Tunisia',TUR:'Turkey',UGA:'Uganda',UKR:'Ukraine',\n  ARE:'UAE',GBR:'United Kingdom',TZA:'Tanzania',USA:'United States',\n  URY:'Uruguay',UZB:'Uzbekistan',VEN:'Venezuela',VNM:'Vietnam',YEM:'Yemen',\n  ZMB:'Zambia',ZWE:'Zimbabwe',SSD:'South Sudan',BLR:'Belarus',ISL:'Iceland',\n  SRB:'Serbia',SVK:'Slovakia',SVN:'Slovenia',MKD:'N. Macedonia',MNE:'Montenegro',\n  XKX:'Kosovo',MCO:'Monaco',SMR:'San Marino',VAT:'Vatican',EST:'Estonia',\n  ISL:'Iceland',\n};\n\n// ── Globe ──────────────────────────────────────────────────────\nconst canvas = document.getElementById('globe-canvas');\nconst ctx = canvas.getContext('2d');\nlet W, H, R, baseScale;\n\nconst projection = d3.geoOrthographic().rotate([-15,-52]).clipAngle(90);\nconst pathGen = d3.geoPath(projection, ctx);\nconst graticule = d3.geoGraticule()();\nlet zoomLevel = 1;\nlet countries;\nlet hoveredCode = null;\nconst tooltip = document.getElementById('tooltip');\n\nfunction resize() {\n  W = canvas.width  = window.innerWidth;\n  H = canvas.height = window.innerHeight;\n  baseScale = Math.min(W, H) * 0.42;\n  R = baseScale * zoomLevel;\n  projection.translate([W/2, H/2]).scale(R);\n  draw();\n}\nwindow.addEventListener('resize', resize);\n\n// ── Colors per mode ───────────────────────────────────────────\nfunction C() {\n  if (isNight) return {\n    oceanInner: '#0d1e38', oceanOuter: '#060c18',\n    graticule: 'rgba(255,255,255,0.04)',\n    other_fill: '#0e0e18', other_stroke: '#181825',\n    euro_fill: '#1c1c28', euro_stroke: '#2e2e40',\n    euro_hover: '#2a2a3a',\n    active_fill: '#00e5a0', active_hover: '#00c488',\n    label_active: 'rgba(255,255,255,0.95)',\n    label_inactive: 'rgba(255,255,255,0.18)',\n    label_other: 'rgba(255,255,255,0.08)',\n    rim: 'rgba(255,255,255,0.07)',\n  };\n  return {\n    oceanInner: '#5bb8f5', oceanOuter: '#2e8ac8',\n    graticule: 'rgba(255,255,255,0.15)',\n    other_fill: '#c8dbc5', other_stroke: '#b0c8ad',\n    euro_fill: '#a8bfcc', euro_stroke: '#90aab8',\n    euro_hover: '#90a8b8',\n    active_fill: '#00c488', active_hover: '#009e70',\n    label_active: 'rgba(10,26,46,0.95)',\n    label_inactive: 'rgba(10,26,46,0.35)',\n    label_other: 'rgba(10,26,46,0.18)',\n    rim: 'rgba(255,255,255,0.3)',\n  };\n}\n\nfunction draw() {\n  const c = C();\n  ctx.clearRect(0, 0, W, H);\n\n  // Ocean\n  ctx.save();\n  ctx.beginPath(); pathGen({ type: 'Sphere' });\n  const g = ctx.createRadialGradient(W/2 - R*0.15, H/2 - R*0.15, R*0.05, W/2, H/2, R);\n  g.addColorStop(0, c.oceanInner);\n  g.addColorStop(1, c.oceanOuter);\n  ctx.fillStyle = g; ctx.fill();\n  ctx.restore();\n\n  // Graticule\n  ctx.save();\n  ctx.beginPath(); pathGen(graticule);\n  ctx.strokeStyle = c.graticule; ctx.lineWidth = 0.4; ctx.stroke();\n  ctx.restore();\n\n  if (!countries) return;\n\n  // All inactive countries\n  countries.features.forEach(f => {\n    const code = NUM_TO_A3[+f.id];\n    if (code && ACTIVE.has(code)) return;\n    ctx.beginPath(); pathGen(f);\n    ctx.fillStyle = code === hoveredCode ? c.euro_hover : c.euro_fill;\n    ctx.fill();\n    ctx.strokeStyle = c.euro_stroke; ctx.lineWidth = 0.4; ctx.stroke();\n  });\n\n  // Active countries\n  countries.features.forEach(f => {\n    const code = NUM_TO_A3[+f.id];\n    if (!code || !ACTIVE.has(code)) return;\n    ctx.save();\n    ctx.beginPath(); pathGen(f);\n    ctx.shadowColor = '#00e5a0'; ctx.shadowBlur = 20;\n    ctx.fillStyle = code === hoveredCode ? c.active_hover : c.active_fill;\n    ctx.fill(); ctx.restore();\n    ctx.beginPath(); pathGen(f);\n    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 0.6; ctx.stroke();\n  });\n\n  // Rim\n  ctx.save(); ctx.beginPath(); pathGen({ type: 'Sphere' });\n  ctx.strokeStyle = c.rim; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();\n\n  // Labels\n  if (R > 250) {\n    countries.features.forEach(f => {\n      const code = NUM_TO_A3[+f.id];\n      const name = NAMES[code];\n      if (!name) return;\n      const isEuro = code && EURO_CODES.has(code);\n      const isAct  = ACTIVE.has(code);\n      const area   = pathGen.area(f);\n      const minArea = isAct ? 50 : 200;\n      if (area < minArea) return;\n\n      const centroid = projection(d3.geoCentroid(f));\n      if (!centroid) return;\n      const gc  = d3.geoCentroid(f);\n      const rot = projection.rotate();\n      const lon = gc[0] + rot[0], lat = gc[1] + rot[1];\n      if (Math.cos(lat * Math.PI/180) * Math.cos(lon * Math.PI/180) < 0) return;\n\n      const fs = Math.max(7, Math.min(11, area / 90));\n      ctx.save();\n      ctx.font = `${isAct ? 600 : 400} ${fs}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;\n      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';\n      ctx.fillStyle = isAct ? c.label_active : c.label_inactive;\n      ctx.fillText(name.toUpperCase(), centroid[0], centroid[1]);\n      ctx.restore();\n    });\n  }\n}\n\n// ── Interaction ───────────────────────────────────────────────\nlet dragging = false, lastX, lastY;\nlet rotateV = [0, 0];\nlet animFrame;\nlet lastClick = 0;\n\nfunction getCountryAt(x, y) {\n  if (!countries) return null;\n  for (let i = countries.features.length - 1; i >= 0; i--) {\n    const f = countries.features[i];\n    ctx.beginPath(); pathGen(f);\n    if (ctx.isPointInPath(x, y)) return NUM_TO_A3[+f.id] || null;\n  }\n  return null;\n}\n\ncanvas.addEventListener('mousedown', e => {\n  dragging = true; lastX = e.clientX; lastY = e.clientY;\n  rotateV = [0, 0]; cancelAnimationFrame(animFrame);\n  tooltip.classList.remove('show');\n});\n\ncanvas.addEventListener('mousemove', e => {\n  if (dragging) {\n    const dx = e.clientX - lastX, dy = e.clientY - lastY;\n    const rot = projection.rotate();\n    projection.rotate([rot[0] + dx*0.28, Math.max(-85, Math.min(85, rot[1] - dy*0.28))]);\n    rotateV = [dx*0.28, -dy*0.28];\n    lastX = e.clientX; lastY = e.clientY;\n    draw(); tooltip.classList.remove('show');\n  } else {\n    const code = getCountryAt(e.clientX, e.clientY);\n    if (code !== hoveredCode) { hoveredCode = code; draw(); }\n    if (code) {\n      const name = NAMES[code] || code;\n      const active = ACTIVE.has(code);\n      document.getElementById('tt-name').textContent = name;\n      const statusEl = document.getElementById('tt-status');\n      statusEl.innerHTML = active\n        ? '<span class=\"tt-active\">● Active market<\u002Fspan>'\n        : '<span class=\"tt-inactive\">Not active<\u002Fspan>';\n      document.querySelector('.tt-hint').style.display = '';\n      let tx = e.clientX + 14, ty = e.clientY - 10;\n      if (tx + 180 > W) tx -= 170;\n      tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';\n      tooltip.classList.add('show');\n    } else {\n      tooltip.classList.remove('show');\n    }\n  }\n});\n\ncanvas.addEventListener('mouseup', () => { dragging = false; momentum(); });\ncanvas.addEventListener('mouseleave', () => {\n  dragging = false; hoveredCode = null;\n  tooltip.classList.remove('show'); draw();\n});\n\n// Double-click to toggle\ncanvas.addEventListener('dblclick', e => {\n  const code = getCountryAt(e.clientX, e.clientY);\n  if (!code) return;\n  if (ACTIVE.has(code)) ACTIVE.delete(code); else ACTIVE.add(code);\n  updateCount(); buildPanel(); draw();\n});\n\ncanvas.addEventListener('wheel', e => {\n  e.preventDefault();\n  zoomLevel = Math.max(0.45, Math.min(4, zoomLevel * (e.deltaY > 0 ? 0.92 : 1.08)));\n  R = baseScale * zoomLevel; projection.scale(R); draw();\n}, { passive: false });\n\n// Touch\ncanvas.addEventListener('touchstart', e => {\n  e.preventDefault(); dragging = true;\n  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; rotateV = [0,0];\n}, { passive: false });\ncanvas.addEventListener('touchmove', e => {\n  e.preventDefault();\n  const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;\n  const rot = projection.rotate();\n  projection.rotate([rot[0] + dx*0.3, Math.max(-85, Math.min(85, rot[1] - dy*0.3))]);\n  rotateV = [dx*0.3, -dy*0.3];\n  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; draw();\n}, { passive: false });\ncanvas.addEventListener('touchend', () => { dragging = false; momentum(); });\n\nfunction momentum() {\n  const decay = 0.92;\n  function step() {\n    if (Math.abs(rotateV[0]) < 0.01 && Math.abs(rotateV[1]) < 0.01) return;\n    const rot = projection.rotate();\n    projection.rotate([rot[0] + rotateV[0], Math.max(-85, Math.min(85, rot[1] + rotateV[1]))]);\n    rotateV[0] *= decay; rotateV[1] *= decay;\n    draw(); animFrame = requestAnimationFrame(step);\n  }\n  step();\n}\n\ndocument.getElementById('zoom-in').addEventListener('click', () => {\n  zoomLevel = Math.min(4, zoomLevel * 1.18);\n  R = baseScale * zoomLevel; projection.scale(R); draw();\n});\ndocument.getElementById('zoom-out').addEventListener('click', () => {\n  zoomLevel = Math.max(0.45, zoomLevel / 1.18);\n  R = baseScale * zoomLevel; projection.scale(R); draw();\n});\n\n// ── Day / Night ───────────────────────────────────────────────\ndocument.getElementById('daynight').addEventListener('click', () => {\n  isNight = !isNight;\n  document.body.className = isNight ? 'night' : 'day';\n  draw();\n});\n\n// ── UI helpers ────────────────────────────────────────────────\nfunction updateCount() {\n  document.getElementById('active-n').textContent = ACTIVE.size;\n}\n\nfunction buildPanel() {\n  const list = document.getElementById('ep-list');\n  list.innerHTML = '';\n  Object.entries(NAMES)\n    .sort((a,b) => a[1].localeCompare(b[1]))\n    .forEach(([code, name]) => {\n      const on = ACTIVE.has(code);\n      const el = document.createElement('div');\n      el.className = 'ep-item';\n      el.innerHTML = `<div class=\"ep-check ${on ? 'on' : ''}\"><\u002Fdiv><span>${name}<\u002Fspan>`;\n      el.addEventListener('click', () => {\n        if (ACTIVE.has(code)) ACTIVE.delete(code); else ACTIVE.add(code);\n        updateCount(); buildPanel(); draw();\n      });\n      list.appendChild(el);\n    });\n}\n\ndocument.getElementById('edit-btn').addEventListener('click', () => {\n  const p = document.getElementById('edit-panel');\n  const open = p.classList.toggle('open');\n  document.getElementById('edit-btn').textContent = open ? 'Done' : 'Edit Markets';\n});\n\n// ── Load data ─────────────────────────────────────────────────\nd3.json(window.__resources && window.__resources.mapData ? window.__resources.mapData : 'countries-110m.json').then(world => {\n  countries = topojson.feature(world, world.objects.countries);\n  resize(); buildPanel(); updateCount();\n}).catch(err => console.error('Map data failed:', err));\n\nresize();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
